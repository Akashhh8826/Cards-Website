<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card-2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="/download.jfif" alt="image" id="top-image">
            
            <div class="textbox">

                <h2 id="head1">Order Summary</h2>
                
                <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Praesentium dolorem delectus cupiditate obcaecati reiciendis magnam.</p>
                
            </div>

            <div class="amountbox">

                <div class="leftbox">

                    <div class="logobox">
                        <img src="/logo.png" alt="logo">
                    </div>

                    <div class="textamountbox">
                        <p>Annual Plan</p>
                        <p>$99.9/year</p>
                    </div>
                    
                </div>

                <div class="rightbox">
                    <a href="#">Change</a>
                </div>

            </div>

            <button id="proceedbutton">Proceed to Payment</button>

            <a href="#">Cancel Order</a>


        </div>
    </div>
</body>
</html>
